<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{ background:#050505; min-height:100vh; color:#fff; overflow:hidden; position:relative; }
body::before{ content:''; position:fixed; width:350px; height:350px; background:#7c3aed; filter:blur(140px); top:-100px; left:-100px; opacity:.35; z-index:-1; }
body::after{ content:''; position:fixed; width:350px; height:350px; background:#2563eb; filter:blur(140px); bottom:-100px; right:-100px; opacity:.35; z-index:-1; }
.header{ position:fixed; top:0; left:0; right:0; height:75px; display:flex; align-items:center; padding:0 18px; backdrop-filter:blur(25px); background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.06); z-index:1000; }
.back-btn{ width:42px; height:42px; border:none; border-radius:12px; cursor:pointer; background:rgba(255,255,255,.05); color:#fff; display:flex; align-items:center; justify-content:center; }
.header-title{ margin-left:15px; font-size:20px; font-weight:600; }
.container{ padding-top:110px; padding-left:20px; padding-right:20px; max-width: 500px; margin: 0 auto; }
.profile-section{ display:flex; flex-direction:column; align-items:center; margin-bottom:40px; }
.avatar-wrap{ position:relative; }
.avatar{ width:150px; height:150px; border-radius:50%; object-fit:cover; border:4px solid rgba(255,255,255,.1); background:#111; box-shadow:0 0 40px rgba(124,58,237,.4); cursor:pointer; }
.camera-btn{ position:absolute; right:5px; bottom:5px; width:42px; height:42px; border:none; border-radius:50%; background:linear-gradient(135deg, #7c3aed, #2563eb); display:flex; justify-content:center; align-items:center; color:#fff; cursor:pointer; }
.change-text{ margin-top:15px; font-size:13px; opacity:.7; }
.card{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(25px); border-radius:22px; padding:20px; }
.label{ font-size:13px; opacity:.8; margin-bottom:10px; }
.input{ width:100%; height:52px; background:rgba(255,255,255,.05); border:none; outline:none; border-radius:14px; padding:0 15px; color:#fff; font-size:15px; }
.input:focus{ border:1px solid rgba(124,58,237,.5); }
.input:disabled{ opacity: 0.5; cursor: not-allowed; }
.save-btn{ width:100%; height:55px; margin-top:25px; border:none; border-radius:16px; cursor:pointer; font-size:15px; font-weight:600; color:#fff; background:linear-gradient(135deg, #7c3aed, #2563eb); transition: opacity 0.2s; }
.save-btn:active{ transform:scale(.96); }
.save-btn:disabled{ opacity: 0.5; cursor: not-allowed; }
.saved{ margin-top:15px; text-align:center; color:#4ade80; display:none; font-size:13px; }
#imageInput{ display:none; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDbH6axEkR127PTFt0IM1VRoLA4xJh-Uow",
    authDomain: "bond-rs.firebaseapp.com",
    projectId: "bond-rs",
    storageBucket: "bond-rs.firebasestorage.app",
    messagingSenderId: "224682992857",
    appId: "1:224682992857:web:6e4946b905606217758ac8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  const avatar = document.getElementById("avatar");
  const imageInput = document.getElementById("imageInput");
  const cameraBtn = document.getElementById("cameraBtn");
  const nameInput = document.getElementById("nameInput");
  const saveBtn = document.getElementById("saveBtn");
  const savedText = document.getElementById("savedText");

  // 4. Local Default Photo Asset
  const DEFAULT_PHOTO = "assets/default-avatar.webp";
  
  let USER_ID = ""; 
  let selectedFileBlob = null;
  let currentObjectURL = null; 

  function toggleLoadingState(isLoading) {
    if (isLoading) {
      saveBtn.innerText = "Loading Profile...";
      saveBtn.disabled = true;
      nameInput.disabled = true;
    } else {
      saveBtn.innerText = "Save Changes";
      saveBtn.disabled = false;
      nameInput.disabled = false;
    }
  }

  toggleLoadingState(true);

  // 1. Strict Identity Consistency (UID or Fixed Role)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      USER_ID = user.uid; // Primary: Strict UID
    } else {
      USER_ID = "SUMIT"; // Fallback/Fixed Role for Chat System
    }
    loadUserData();
  });

  async function loadUserData() {
    try {
      const docRef = doc(db, "users", USER_ID);
      const docSnap = await getDoc(docRef);
      
      if (docSnap.exists()) {
        const data = docSnap.data();
        nameInput.value = data.name || "";
        
        // Add cache-busting to the image URL to prevent browser caching old overwritten images
        if (data.photo) {
          const separator = data.photo.includes('?') ? '&' : '?';
          avatar.src = `${data.photo}${separator}v=${new Date().getTime()}`;
        } else {
          avatar.src = DEFAULT_PHOTO;
        }
      } else {
        avatar.src = DEFAULT_PHOTO;
      }
    } catch (error) {
      console.log("--- LOAD ERROR ---", error);
    } finally {
      toggleLoadingState(false);
    }
  }

  const triggerFileInput = () => imageInput.click();
  avatar.onclick = triggerFileInput;
  cameraBtn.onclick = triggerFileInput;

  imageInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    if (!file.type.startsWith('image/')) {
        alert("Please select a valid image file.");
        imageInput.value = "";
        return;
    }
    
    if (file.size > 5 * 1024 * 1024) {
        alert("File size must be less than 5MB.");
        imageInput.value = "";
        return;
    }

    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement("canvas");
            const MAX_SIZE = 512;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
            } else {
                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob((blob) => {
                if (!blob) {
                    alert("Image compression failed.");
                    return;
                }

                selectedFileBlob = blob;
                
                if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(blob);
                avatar.src = currentObjectURL;
            }, "image/webp", 0.85);
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  saveBtn.addEventListener("click", async function() {
    const updatedName = nameInput.value.trim();
    if (!updatedName) {
        alert("Display Name cannot be empty.");
        return;
    }

    saveBtn.innerText = "Saving...";
    saveBtn.disabled = true;

    try {
      let imageUrl = avatar.src.split('?v=')[0]; // Remove cache-busting string before saving

      if (selectedFileBlob) {
        // 5. Storage Cleanup (Auto-Overwrite by removing timestamp)
        const fileName = `avatar.webp`;
        const storageRef = ref(storage, `profile_pictures/${USER_ID}/${fileName}`);
        
        await uploadBytes(storageRef, selectedFileBlob);
        imageUrl = await getDownloadURL(storageRef);
        
        if (currentObjectURL) {
            URL.revokeObjectURL(currentObjectURL);
            currentObjectURL = null;
        }
        selectedFileBlob = null;
      }

      // 6. Added serverTimestamp for debugging
      await setDoc(doc(db, "users", USER_ID), {
        name: updatedName,
        photo: imageUrl,
        lastProfileUpdate: serverTimestamp()
      }, { merge: true });

      savedText.style.display = "block";
      setTimeout(() => { savedText.style.display = "none"; }, 2000);

    } catch (error) {
      console.log("--- FIREBASE SAVE CRITICAL FAILURE ---", error);
      alert("Error saving profile: " + error.message);
    } finally {
      saveBtn.innerText = "Save Changes";
      saveBtn.disabled = false;
    }
  });
</script>
</head>
<body>

<div class="header">
<button class="back-btn" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
<div class="header-title">Profile</div>
</div>

<div class="container">
<div class="profile-section">
<div class="avatar-wrap">
<img id="avatar" class="avatar" src="assets/default-avatar.webp" onerror="this.src='https://via.placeholder.com/300?text=Profile'">
<button class="camera-btn" id="cameraBtn"><span class="material-symbols-outlined">photo_camera</span></button>
</div>
<div class="change-text">Tap to change profile photo</div>
<input type="file" id="imageInput" accept="image/*">
</div>

<div class="card">
<div class="label">Display Name</div>
<input type="text" id="nameInput" class="input" placeholder="Enter your name">
<button class="save-btn" id="saveBtn">Save Changes</button>
<div class="saved" id="savedText">Profile Saved Successfully</div>
</div>
</div>

</body>
</html>
