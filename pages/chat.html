<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #050505;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    color: white;
    animation: fadeInPage 0.4s ease-out;
}

@keyframes fadeInPage {
    0% { opacity: 0; }
    100% { opacity: 1; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

body::before {
    content: ''; position: fixed; width: 350px; height: 350px;
    background: #7c3aed; filter: blur(140px); top: -100px; left: -100px; opacity: .35;
}

body::after {
    content: ''; position: fixed; width: 350px; height: 350px;
    background: #2563eb; filter: blur(140px); bottom: -100px; right: -100px; opacity: .35;
}

/* Header */
.header {
    position: fixed; top: 0; left: 0; right: 0; height: 75px;
    backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000;
}

.left { display: flex; align-items: center; gap: 12px; }
.dp { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #2563eb); box-shadow: 0 0 20px rgba(139,92,246,.35); }
.dp img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block; }
.info h3 { font-size: 16px; font-weight: 600; }
.status { font-size: 12px; color: #4ade80; margin-top: 2px; display: flex; align-items: center; gap: 4px; }

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
}
.pulse-dot { display: inline-block; animation: pulse 2s infinite; }

.right { display: flex; gap: 10px; }

.icon-btn {
    width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,.05);
    color: white; display: flex; justify-content: center; align-items: center;
    text-decoration: none; transition: .3s; border: none; cursor: pointer;
}

.icon-btn:active { transform: scale(0.9); }

/* Chat Area */
.chat-area {
    position: absolute; top: 75px; bottom: 75px; left: 0; right: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 20px 20px 40px 20px; scroll-behavior: smooth; z-index: 10;
}

.system-badge {
    background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px; padding: 10px 15px; text-align: center; font-size: 11px;
    color: rgba(255, 255, 255, 0.5); margin: 10px auto 25px auto; width: 90%; max-width: 350px;
    backdrop-filter: blur(10px);
}
.system-badge span { color: #8b5cf6; font-weight: 600; }

@keyframes popIn {
    0% { opacity: 0; transform: translateY(15px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

.message {
    max-width: 75%; padding: 12px 15px; border-radius: 18px; margin-bottom: 15px;
    word-wrap: break-word; animation: popIn 0.3s ease-out forwards;
    display: flex; flex-direction: column; position: relative; user-select: none;
}

.received { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.05); border-bottom-left-radius: 4px; }
.sent { margin-left: auto; border-bottom-right-radius: 4px; background: linear-gradient(135deg, #7c3aed, #2563eb); }
.deleted-msg { font-style: italic; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 5px; }

/* Emoji Reaction Badge */
.reaction-badge {
    position: absolute; bottom: -12px; background: #1a1a1a; 
    border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; 
    padding: 2px 6px; font-size: 14px; box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    animation: popIn 0.2s ease-out forwards; z-index: 5;
}
.sent .reaction-badge { left: 10px; }
.received .reaction-badge { right: 10px; }

/* Message Time Fixed */
.time {
    font-size: 11px; opacity: .75; margin-top: 5px; text-align: right; font-weight: 500; display: flex; justify-content: flex-end; align-items: center; gap: 4px;
}

/* Floating Buttons */
.floating {
    position: fixed; right: 15px; bottom: 95px; 
    display: flex; flex-direction: column; gap: 10px; z-index: 100;
}

.float-btn {
    width: 50px; height: 50px; border-radius: 15px; color: white; border: none; cursor: pointer;
    display: flex; justify-content: center; align-items: center; text-decoration: none;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.08); transition: .3s;
}

.float-btn:active { transform: scale(0.9); }
.presence { background: linear-gradient(135deg, #7c3aed, #2563eb); border: none; }

/* Input Area */
.input-area {
    position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
    padding: 0 10px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    background: rgba(255,255,255,.04); border-top: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; justify-content: space-between; gap: 6px; z-index: 1000;
}

.action-btn {
    width: 42px; min-width: 42px; height: 42px; border: none; border-radius: 12px;
    background: rgba(255,255,255,.05); color: white; display: flex; justify-content: center;
    align-items: center; cursor: pointer; transition: 0.3s;
}

.input-box {
    flex-grow: 1; height: 42px; border: 1px solid transparent; outline: none; padding: 0 12px;
    border-radius: 12px; background: rgba(255,255,255,.05); color: white; font-size: 14px;
}
.input-box:focus { border-color: rgba(139,92,246, 0.5); }

.send-btn {
    width: 42px; min-width: 42px; height: 42px; border: none; border-radius: 12px; cursor: pointer;
    color: white; display: flex; justify-content: center; align-items: center;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
}
.send-btn:active, .action-btn:active { transform: scale(0.9); }

@media (max-width: 360px) {
    .floating { transform: scale(0.9); transform-origin: bottom right; }
}

/* Full Screen Image/Video Viewer Modal */
.img-modal {
    display: none; position: fixed; z-index: 2000; left: 0; top: 0;
    width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    justify-content: center; align-items: center; flex-direction: column;
}
.img-modal img, .img-modal video {
    max-width: 95%; max-height: 80vh; border-radius: 12px;
    object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5);
    animation: popIn 0.3s ease-out;
}
.close-modal {
    position: absolute; top: 20px; right: 25px; color: white;
    font-size: 35px; font-weight: bold; cursor: pointer;
    background: rgba(255,255,255,0.1); width: 40px; height: 40px;
    border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 2010;
}

/* File Preview Area */
.preview-area {
    display: none; position: fixed; bottom: 85px; left: 15px;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    padding: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    animation: popIn 0.3s ease-out;
}
.preview-area img, .preview-area video {
    height: 90px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1);
}
.preview-close {
    position: absolute; top: -10px; right: -10px;
    background: #ef4444; color: white; width: 24px; height: 24px;
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    font-size: 14px; font-weight: bold; cursor: pointer; border: 2px solid #050505;
}

/* Date Divider */
.date-divider {
    text-align: center; margin: 20px 0; font-size: 12px; color: rgba(255,255,255,0.5);
    font-weight: 500; text-transform: uppercase; letter-spacing: 1px;
}
.date-divider span {
    background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 12px;
}

/* Typing Indicator Text */
.typing-text {
    font-size: 11px; color: #8b5cf6; margin-top: 2px; display: none; font-style: italic;
}
.mic-recording { background: #ef4444 !important; animation: pulse 1s infinite; }

/* NEW: Silent Video Presence Toast Style */
.presence-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(124, 58, 237, 0.6); border-radius: 14px;
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 15px;
    z-index: 9999; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(124, 58, 237, 0.2);
    color: #fff; width: 90%; max-width: 400px;
    animation: popDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes popDown {
    0% { opacity: 0; transform: translate(-50%, -20px) scale(0.95); }
    100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
}
.toast-content { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
.toast-content .icon { color: #4ade80; animation: pulse 2s infinite; }
.toast-text { font-size: 13px; line-height: 1.4; }
.toast-actions { display: flex; gap: 8px; }
.join-btn { background: #7c3aed; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
.join-btn:active { transform: scale(0.95); }
.decline-btn { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; }
.decline-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div id="videoPresenceToast" class="presence-toast" style="display: none;">
    <div class="toast-content">
        <span class="material-symbols-outlined icon">videocam</span>
        <div class="toast-text">
            <strong id="presenceCallerName">BOND SR</strong> started a silent video presence
        </div>
    </div>
    <div class="toast-actions">
        <button id="joinPresenceBtn" class="join-btn">Join</button>
        <button id="declinePresenceBtn" class="decline-btn">Ignore</button>
    </div>
</div>

<div class="header">
    <div class="left">
        <div class="dp">
    <img id="headerPhoto" src="" />
    </div>
        <div class="info">
            <h3 id="headerName">BOND SR</h3>
            <div class="status">
                <span id="onlineStatusText"><span class="pulse-dot">●</span> Online</span>
                <div id="typingIndicator" class="typing-text">typing...</div>
            </div>
        </div>
    </div>

    <div class="right">
        <button aria-label="View Gallery" class="icon-btn" onclick="window.location.href='gallery.html'">
            <span class="material-symbols-outlined">image</span>
        </button>
        <button aria-label="View Profile" class="icon-btn" onclick="window.location.href='profile.html'">
            <span class="material-symbols-outlined">person</span>
        </button>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="system-badge"> 
        🔒 <span>BOND SR</span> Chat securely developed & owned by <span>sumitsantrasolution</span> © 2026 
    </div>
</div>

<div id="imageModal" class="img-modal">
    <span class="close-modal" id="closeModal">&times;</span>
    <img id="modalImage" src="" style="display:none;">
    <video id="modalVideo" src="" controls style="display:none;"></video>
</div>

<div class="floating">
    <button aria-label="Audio Call" class="float-btn" onclick="startAudioCall()">
        <span class="material-symbols-outlined">call</span>
    </button>
    <button aria-label="Video Call" class="float-btn" onclick="startVideoCall()">
        <span class="material-symbols-outlined">videocam</span>
    </button>
    <button aria-label="Video Presence" class="float-btn presence" onclick="startVideoPresence()">
        <span class="material-symbols-outlined">visibility</span>
    </button>
</div>

<div class="preview-area" id="previewArea">
    <div class="preview-close" id="previewClose">&times;</div>
    <div id="previewContent"></div>
</div>

<div class="input-area">
    <button aria-label="Attach Photo" class="action-btn">
        <span class="material-symbols-outlined">photo_library</span>
    </button>
    
    <input
  type="file"
  id="mediaInput"
  accept="image/*,video/*"
  style="display:none;"
  >
  
    <button aria-label="Send Voice Message" class="action-btn" id="micBtn">
        <span class="material-symbols-outlined">mic</span>
    </button>

    <input
        type="text"
        id="msgInput"
        class="input-box"
        placeholder="Message..."
        autocomplete="off"
    >

    <button aria-label="Send Message" class="send-btn" id="sendBtn">
        <span class="material-symbols-outlined">send</span>
    </button>
</div>

<script type="module">
    // Firebase Core + Firestore + Auth import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js"; 
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"; 
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDbH6axEkR127PTFt0IM1VRoLA4xJh-Uow", 
        authDomain: "bond-rs.firebaseapp.com", 
        projectId: "bond-rs", 
        storageBucket: "bond-rs.firebasestorage.app", 
        messagingSenderId: "224682992857", 
        appId: "1:224682992857:web:6e4946b905606217758ac8" 
    }; 
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    const auth = getAuth(app); 

    const ROOM_ID = "SR";
    const messagesRef = collection(db, "rooms", ROOM_ID, "messages");
    const typingRef = doc(db, "rooms", ROOM_ID, "typing", "status"); 

    const chatArea = document.getElementById('chatArea');
    const inputBox = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const mediaInput = document.getElementById('mediaInput');
    const photoBtn = document.querySelector('[aria-label="Attach Photo"]');
    const micBtn = document.getElementById('micBtn');

    let selectedFile = null;
    let CURRENT_USER = null;
    const OTHER_USER = "RUBINA";
    let lastRenderedDate = ""; 

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    // --- STEP 2: Audio Call Function ---
    window.startAudioCall = async function() {
        if (!CURRENT_USER) return;
        try {
            await setDoc(doc(db, "calls", "currentCall"), {
                caller: CURRENT_USER,
                receiver: OTHER_USER,
                type: "audio",
                status: "ringing",
                createdAt: serverTimestamp()
            }, { merge: true });
        } catch (error) {
            console.error("Audio Call Error:", error);
        }
    };

    // --- STEP 3: Video Call Function ---
    window.startVideoCall = async function() {
        if (!CURRENT_USER) return;
        try {
            await setDoc(doc(db, "calls", "currentCall"), {
                caller: CURRENT_USER,
                receiver: OTHER_USER,
                type: "video",
                status: "ringing",
                createdAt: serverTimestamp()
            }, { merge: true });
        } catch (error) {
            console.error("Video Call Error:", error);
        }
    };

    // --- NEW: Video Presence Call Function ---
    window.startVideoPresence = async function() {
        if (!CURRENT_USER) return;
        try {
            await setDoc(doc(db, "calls", "currentCall"), {
                caller: CURRENT_USER,
                receiver: OTHER_USER,
                type: "presence",
                status: "calling",
                createdAt: serverTimestamp()
            }, { merge: true });
            // Caller goes straight to the presence page
            window.location.href = "video-presence.html";
        } catch (error) {
            console.error("Presence Call Error:", error);
        }
    };

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function formatDateString(date) {
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (date.toDateString() === today.toDateString()) return "Today";
        if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
        return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    const updateUserPresence = async (isOnline) => {
        if(!CURRENT_USER) return;
        const userRef = doc(db, "users", CURRENT_USER);
        try {
            await setDoc(userRef, {
                online: isOnline,
                lastSeen: serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error("Presence Error", e); }
    };

    function createMessageElement(msg, id) {
        const div = document.createElement("div");
        
        if (msg[`deletedFor_${CURRENT_USER}`]) {
            div.style.display = "none";
            return div;
        }
        
        div.className = msg.sender === CURRENT_USER ? "message sent" : "message received";
        div.id = id;

        let pressTimer;
        let lastTap = 0;

        div.addEventListener('touchstart', (e) => {
            if(msg.type === "deleted") return;
            pressTimer = setTimeout(() => {
                if (msg.sender === CURRENT_USER) {
                    if(confirm("Delete this message for everyone?")) {
                        updateDoc(doc(db, "rooms", ROOM_ID, "messages", id), {
                            text: "This message was deleted",
                            type: "deleted",
                            url: null,
                            reaction: null
                        });
                    }
                } else {
                    if(confirm("Delete this message just for you?")) {
                        updateDoc(doc(db, "rooms", ROOM_ID, "messages", id), {
                            [`deletedFor_${CURRENT_USER}`]: true
                        });
                        div.style.display = "none"; 
                    }
                }
            }, 1000); 
        });

        div.addEventListener('touchend', (e) => {
            clearTimeout(pressTimer);
            if(msg.type === "deleted") return;

            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            if (tapLength < 300 && tapLength > 0) {
                const newReaction = msg.reaction === "❤️" ? null : "❤️";
                updateDoc(doc(db, "rooms", ROOM_ID, "messages", id), {
                    reaction: newReaction
                });
                e.preventDefault();
            }
            lastTap = currentTime;
        });

        div.addEventListener('touchmove', () => clearTimeout(pressTimer));
        
        if (msg.type === "deleted") {
            div.innerHTML = `<div class="deleted-msg"><span class="material-symbols-outlined" style="font-size:16px;">block</span>${msg.text}</div>`;
        } 
        else {
            if (msg.type === "image") {
                const img = document.createElement("img");
                img.src = msg.url;
                img.style.maxWidth = "220px";
                img.style.borderRadius = "10px";
                img.style.cursor = "pointer"; 
                
                img.onclick = function(e) {
                    e.stopPropagation(); 
                    document.getElementById("imageModal").style.display = "flex";
                    document.getElementById("modalVideo").style.display = "none";
                    document.getElementById("modalImage").style.display = "block";
                    document.getElementById("modalImage").src = this.src;
                };
                div.appendChild(img);
            } else if (msg.type === "video") {
                const video = document.createElement("video");
                video.src = msg.url;
                video.style.maxWidth = "220px";
                video.style.borderRadius = "10px";
                video.style.cursor = "pointer";
                
                video.onclick = function(e) {
                    e.stopPropagation();
                    document.getElementById("imageModal").style.display = "flex";
                    document.getElementById("modalImage").style.display = "none";
                    const mVideo = document.getElementById("modalVideo");
                    mVideo.style.display = "block";
                    mVideo.src = this.src;
                    mVideo.play();
                };
                div.appendChild(video);
            } else if (msg.type === "audio") {
                const audio = document.createElement("audio");
                audio.src = msg.url;
                audio.controls = true;
                audio.style.width = "220px";
                div.appendChild(audio);
            }
            
            if (msg.text) {
                const textSpan = document.createElement("span");
                if (msg.type !== "text") textSpan.style.marginTop = "5px"; 
                textSpan.textContent = msg.text;
                div.appendChild(textSpan);
            }

            if (msg.reaction) {
                const reactDiv = document.createElement("div");
                reactDiv.className = "reaction-badge";
                reactDiv.textContent = msg.reaction;
                div.appendChild(reactDiv);
            }
        }

        const timeDiv = document.createElement("div");
        timeDiv.className = "time";
        let timeString = "Sending...";
        let tickHtml = "";

        if(msg.timestamp) {
            const date = msg.timestamp.toDate();
            timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (msg.sender === CURRENT_USER) {
                const tickColor = msg.seen ? '#4ade80' : 'rgba(255,255,255,0.6)';
                const tickIcon = msg.seen ? 'done_all' : 'check';
                tickHtml = `<span class="material-symbols-outlined" style="font-size: 14px; color: ${tickColor};">${tickIcon}</span>`;
            }
        }
        
        timeDiv.innerHTML = `${timeString} ${tickHtml}`;
        div.appendChild(timeDiv);

        return div;
    }

    function initChat() {
        const q = query(messagesRef, orderBy("timestamp", "asc"), limit(100)); 
        
        onSnapshot(q, (snapshot) => { 
            snapshot.docChanges().forEach((change) => { 
                const msg = change.doc.data(); 

                if (change.type === "added") {
                    if(msg.timestamp) {
                        const msgDateStr = formatDateString(msg.timestamp.toDate());
                        if(msgDateStr !== lastRenderedDate) {
                            const dateDiv = document.createElement("div");
                            dateDiv.className = "date-divider";
                            dateDiv.innerHTML = `<span>${msgDateStr}</span>`;
                            chatArea.appendChild(dateDiv);
                            lastRenderedDate = msgDateStr;
                        }
                    }

                    const msgElement = createMessageElement(msg, change.doc.id);
                    chatArea.appendChild(msgElement);

                    if (msg.sender !== CURRENT_USER && !msg.seen) {
                        updateDoc(doc(db, "rooms", ROOM_ID, "messages", change.doc.id), { seen: true });
                    }
                }
                
                if (change.type === "modified") {
                    const el = document.getElementById(change.doc.id);
                    if(el) {
                        const updatedMsgElement = createMessageElement(msg, change.doc.id);
                        el.replaceWith(updatedMsgElement);
                    }
                }
            }); 
            scrollToBottom();
        }); 

        onSnapshot(typingRef, (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                const typingIndicator = document.getElementById("typingIndicator");
                const onlineText = document.getElementById("onlineStatusText");
                if(data[OTHER_USER] === true) {
                    onlineText.style.display = "none";
                    typingIndicator.style.display = "block";
                } else {
                    onlineText.style.display = "block";
                    typingIndicator.style.display = "none";
                }
            }
        });
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            CURRENT_USER = user.uid; CURRENT_USER = "SUMIT";
            initChat(); 
            updateUserPresence(true);
            
            // --- STEP 6: Incoming Call Listener ---
            onSnapshot(doc(db, "calls", "currentCall"), (snap) => {
                if (!snap.exists()) return;
                const call = snap.data();
                if (!call) return;

                // Standard Audio/Video Calls
                if (call.receiver === CURRENT_USER && call.status === "ringing") {
                    if (call.type === "audio") {
                        window.location.href = "incoming-audio-call.html";
                    }
                    if (call.type === "video") {
                        window.location.href = "incoming-video-call.html";
                    }
                }

                // NEW: Silent Video Presence Incoming Logic
                const toast = document.getElementById("videoPresenceToast");
                if (call.receiver === CURRENT_USER && call.type === "presence" && call.status === "calling") {
                    const partnerName = document.getElementById("headerName").textContent || call.caller;
                    document.getElementById("presenceCallerName").innerText = partnerName;
                    toast.style.display = "flex";
                    
                    document.getElementById("joinPresenceBtn").onclick = async () => {
                        toast.style.display = "none";
                        // Update status so toast doesn't persist, then navigate
                        await setDoc(doc(db, "calls", "currentCall"), { status: "joined" }, { merge: true });
                        window.location.href = "video-presence.html";
                    };
                    
                    document.getElementById("declinePresenceBtn").onclick = async () => {
                        toast.style.display = "none";
                        await setDoc(doc(db, "calls", "currentCall"), { status: "ended" }, { merge: true });
                    };
                } else {
                    // Hide toast if the call status changes (e.g., caller canceled)
                    toast.style.display = "none";
                }
            });

        } else {
            signInAnonymously(auth).catch((error) => console.error("Auth Error:", error));
        }
    });

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') {
            updateUserPresence(true);
        } else {
            updateUserPresence(false);
        }
    });
    window.addEventListener("beforeunload", () => {
        updateUserPresence(false);
    });

    async function sendMessage(audioFile = null) { 
        const text = inputBox.value.trim(); 
        let targetFile = audioFile || selectedFile;

        if (!text && !targetFile) return;
        if (!CURRENT_USER) return; 
        
        setDoc(typingRef, { [CURRENT_USER]: false }, { merge: true });

        inputBox.value = ""; 
        scrollToBottom();

        sendBtn.disabled = true;
        sendBtn.innerHTML = `<span class="material-symbols-outlined pulse-dot">hourglass_empty</span>`;

        document.getElementById("previewArea").style.display = "none";

        const tempId = "loading-" + Date.now();
        if (targetFile) {
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "message sent";
            loadingDiv.id = tempId;
            loadingDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-outlined pulse-dot" style="font-size: 18px;">cloud_upload</span>
                    <span style="font-size: 13px;">Media Uploading... ⏳</span>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            scrollToBottom();
        }

        try { 
            let fileUrl = "";
            let fileType = "";

            if (targetFile) {
                const formData = new FormData();
                formData.append("file", targetFile);
                
                let uploadType = "image";
                if (targetFile.type.startsWith("video/") || targetFile.type.startsWith("audio/")) {
                    uploadType = "video"; 
                }
                
                formData.append("upload_preset", "bondsr");
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/dwhgn8mlu/${uploadType}/upload`, {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                fileUrl = data.secure_url;
                
                if(targetFile.type.startsWith("audio/")) fileType = "audio";
                else if (targetFile.type.startsWith("video/")) fileType = "video";
                else fileType = "image";
            }

            await addDoc(messagesRef, {
                sender: CURRENT_USER,
                text: text,
                url: fileUrl,
                type: fileType || "text",
                seen: false,
                timestamp: serverTimestamp()
            });

            selectedFile = null;
            mediaInput.value = "";
            document.getElementById("previewContent").innerHTML = "";

        } catch(error) { 
            alert("Failed to send message!");
            console.error(error); 
        } finally {
            const tempMsg = document.getElementById(tempId);
            if(tempMsg) tempMsg.remove();
            
            sendBtn.disabled = false;
            sendBtn.innerHTML = `<span class="material-symbols-outlined">send</span>`;
        }
    }

    micBtn.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioFile = new File([audioBlob], "voice_msg.mp3", { type: 'audio/mp3' });
                    sendMessage(audioFile); 
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('mic-recording');
                micBtn.innerHTML = `<span class="material-symbols-outlined">stop_circle</span>`;
            } catch (err) {
                alert("Microphone permission denied or not available!");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('mic-recording');
            micBtn.innerHTML = `<span class="material-symbols-outlined">mic</span>`;
        }
    });

    sendBtn.addEventListener('click', () => sendMessage(null));
    
    let typingTimer;
    inputBox.addEventListener('input', () => {
        setDoc(typingRef, { [CURRENT_USER]: true }, { merge: true });
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            setDoc(typingRef, { [CURRENT_USER]: false }, { merge: true });
        }, 2000); 
    });

    inputBox.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage(null);
        }
    });
    
    photoBtn.addEventListener('click', () => {
        mediaInput.click();
    });
    
    mediaInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            const previewArea = document.getElementById("previewArea");
            const previewContent = document.getElementById("previewContent");
            previewContent.innerHTML = ""; 
            
            const fileUrl = URL.createObjectURL(selectedFile);
            
            if (selectedFile.type.startsWith("image/")) {
                const img = document.createElement("img");
                img.src = fileUrl;
                previewContent.appendChild(img);
            } else if (selectedFile.type.startsWith("video/")) {
                const video = document.createElement("video");
                video.src = fileUrl;
                previewContent.appendChild(video);
            }
            previewArea.style.display = "block"; 
        }
    });

    document.getElementById("previewClose").addEventListener("click", () => {
        selectedFile = null;
        mediaInput.value = "";
        document.getElementById("previewArea").style.display = "none";
        document.getElementById("previewContent").innerHTML = "";
    });

    function loadPartnerProfileRealtime() {
        onSnapshot(doc(db, "users", OTHER_USER), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("headerName").textContent = data.name || OTHER_USER;
                if (data.photo) document.getElementById("headerPhoto").src = data.photo;
                
                const statusElem = document.getElementById("onlineStatusText");
                if (data.online) {
                    statusElem.innerHTML = `<span class="pulse-dot">●</span> Online`;
                    statusElem.style.color = "#4ade80"; 
                } else {
                    if(data.lastSeen) {
                        const date = data.lastSeen.toDate();
                        const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        const today = new Date();
                        const yesterday = new Date(today);
                        yesterday.setDate(yesterday.getDate() - 1);
                        
                        let datePrefix = "at";
                        if(date.toDateString() === yesterday.toDateString()) datePrefix = "Yesterday at";
                        else if(date.toDateString() !== today.toDateString()) datePrefix = `on ${date.toLocaleDateString([], { day: 'numeric', month: 'short' })} at`;
                        
                        statusElem.innerHTML = `Last seen ${datePrefix} ${timeStr}`;
                    } else {
                        statusElem.innerHTML = `Offline`;
                    }
                    statusElem.style.color = "rgba(255,255,255,0.6)"; 
                }
            }
        });
    }

    loadPartnerProfileRealtime();

    document.getElementById("closeModal").addEventListener("click", () => {
        document.getElementById("imageModal").style.display = "none";
        document.getElementById("modalVideo").pause(); 
    });
    document.getElementById("imageModal").addEventListener("click", (e) => {
        if(e.target.id === "imageModal") {
            document.getElementById("imageModal").style.display = "none";
            document.getElementById("modalVideo").pause();
        }
    });
</script>
