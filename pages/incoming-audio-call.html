<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid VIP Call UI - Fixed</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BOND SR">

    <link rel="apple-touch-icon" href="assets/splash/icon.png">

    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_16_Plus__iPhone_15_Pro_Max__iPhone_15_Plus__iPhone_14_Pro_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_16__iPhone_15_Pro__iPhone_15__iPhone_14_Pro_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_14_Plus__iPhone_13_Pro_Max__iPhone_12_Pro_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_13_mini__iPhone_12_mini__iPhone_11_Pro__iPhone_XS__iPhone_X_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_11_Pro_Max__iPhone_XS_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_11__iPhone_XR_portrait.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- মর্ফিং কন্টেইনার --- */
        .morph-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 50px;
            background-color: #111111;
            border-radius: 25px;
            border: 1px solid #222222;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .morph-container.expanded {
            width: 90%;
            max-width: 380px;
            height: 80vh;
            max-height: 700px;
            border-radius: 40px;
            background-color: #050505;
            border: 1px solid #1a1a1a;
            cursor: default;
        }

        /* --- পিল ভিউ --- */
        .pill-view {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .morph-container.expanded .pill-view {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulseFast 1s infinite alternate;
        }

        @keyframes pulseFast {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0.5; }
        }

        .pill-text {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* --- ফুল স্ক্রিন ভিউ --- */
        .full-view {
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px;
            pointer-events: none;
            transition: opacity 0.4s ease 0.3s;
        }

        .morph-container.expanded .full-view {
            opacity: 1;
            pointer-events: auto;
        }

        .caller-info {
            text-align: center;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-box {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 2px solid #10b981;
            padding: 4px;
            background-color: #000;
            transition: border-color 0.3s ease;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .caller-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .call-status {
            color: #10b981;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .timer-display {
            font-size: 18px;
            color: #ffffff;
            font-family: monospace;
            letter-spacing: 2px;
            display: none;
            margin-top: 10px;
        }

        /* --- বাটন এরিয়া --- */
        /* ইনিশিয়াল রিসিভ/ডিক্লাইন বাটন কন্টেইনার */
        .action-area {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            padding: 0 10px 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* কল চলাকালীন এন্ড কল বাটন কন্টেইনার */
        .connected-area {
            display: none; /* শুরুতে লুকানো থাকবে */
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 10px 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .btn-decline {
            background-color: #1f0808;
            color: #ef4444;
            border: 1px solid #3b0f0f;
        }

        .btn-decline:active {
            background-color: #ef4444;
            color: #ffffff;
        }

        .btn-accept {
            background-color: #062b1a;
            color: #10b981;
            border: 1px solid #0d4a2f;
        }

        .btn-accept:active {
            background-color: #10b981;
            color: #ffffff;
        }

        .btn-label {
            color: #737373;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <audio id="remoteAudio" autoplay></audio>

    <div class="morph-container" id="morphContainer">
        
        <div class="pill-view" id="pillView">
            <div class="pulse-dot"></div>
            <span class="pill-text">Incoming Call...</span>
        </div>

        <div class="full-view">
            <div class="caller-info">
                <div class="avatar-box" id="avatarBox">
                    <img id="partnerPhoto" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop" class="avatar-img" alt="Profile">
                </div>
                <h1 class="caller-name" id="partnerName">Connecting...</h1>
                <p class="call-status" id="callStatusText">Incoming Audio Call</p>
                <div class="timer-display" id="timerDisplay">00:00</div>
            </div>

            <div class="action-area" id="actionArea">
                <div class="btn-wrapper">
                    <button class="action-btn btn-decline" id="declineBtn">
                        <i class="fas fa-times"></i>
                    </button>
                    <span class="btn-label">Decline</span>
                </div>

                <div class="btn-wrapper">
                    <button class="action-btn btn-accept" id="acceptBtn">
                        <i class="fas fa-check"></i>
                    </button>
                    <span class="btn-label">Accept</span>
                </div>
            </div>

            <div class="connected-area" id="connectedArea">
                <div class="btn-wrapper">
                    <button class="action-btn btn-decline" id="endCallBtn">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                    <span class="btn-label">End Call</span>
                </div>
            </div>
            
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js"; 
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"; 
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDbH6axEkR127PTFt0IM1VRoLA4xJh-Uow", 
            authDomain: "bond-rs.firebaseapp.com", 
            projectId: "bond-rs", 
            storageBucket: "bond-rs.firebasestorage.app", 
            messagingSenderId: "224682992857", 
            appId: "1:224682992857:web:6e4946b905606217758ac8" 
        }; 
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // সেশন থেকে ডায়নামিক আইডেন্টিটি নেওয়া
        let CURRENT_USER = sessionStorage.getItem("CURRENT_USER");
        
        // যদি সেশনে আইডেন্টিটি না থাকে, তাহলে লগইন পেজে পাঠিয়ে দেবে
        if (!CURRENT_USER) {
            window.location.href = "index-PWA.html";
        }
        
        // পার্টনার সিলেক্ট করা (যে কল করছে)
        const CALLER_USER = (CURRENT_USER === "SUMIT") ? "RUBINA" : "SUMIT";
        
        const callDocRef = doc(db, "calls", "currentCall");

        // WebRTC Config
        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        let pc = new RTCPeerConnection(servers);
        let localStream = null;
        let remoteStream = new MediaStream();
        const processedCandidates = new Set(); // WebRTC Candidate protection

        // ==========================================
        // Ringtone Assets Setup & Cleanup Logic
        // ==========================================
        const incomingRingtone = new Audio('assets/ringtone.mp3');
        incomingRingtone.loop = true;

        function stopRingtone() {
            incomingRingtone.pause();
            incomingRingtone.currentTime = 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const morphContainer = document.getElementById('morphContainer');
            const pillView = document.getElementById('pillView');
            const avatarBox = document.getElementById('avatarBox');
            
            const acceptBtn = document.getElementById('acceptBtn');
            const declineBtn = document.getElementById('declineBtn');
            const endCallBtn = document.getElementById('endCallBtn');
            
            const callStatusText = document.getElementById('callStatusText');
            const timerDisplay = document.getElementById('timerDisplay');
            const actionArea = document.getElementById('actionArea');
            const connectedArea = document.getElementById('connectedArea');
            const remoteAudio = document.getElementById('remoteAudio');

            let timerInterval;
            let isEnding = false;

            // Start Ringtone immediately on incoming call UI load
            incomingRingtone.play().catch(e => console.log("Ringtone autoplay blocked by browser", e));

            // পার্টনারের নাম ও ছবি লোড করা (যিনি কল করছেন)
            getDoc(doc(db, "users", CALLER_USER)).then((userSnap) => {
                if(userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('partnerName').textContent = data.name || CALLER_USER;
                    if(data.photo) document.getElementById('partnerPhoto').src = data.photo;
                }
            });

            // ১. পিল এ ক্লিক করলে স্ক্রিন বড় হবে
            pillView.addEventListener('click', (e) => {
                e.stopPropagation();
                morphContainer.classList.add('expanded');
            });

            // ==========================================
            // FIX 1: terminateCall with strict status handling
            // ==========================================
            const terminateCall = async (reason = "idle", e = null) => {
                if(e) e.stopPropagation();
                if(isEnding) return;
                isEnding = true;

                clearInterval(timerInterval);
                stopRingtone();
                
                // Cleanup WebRTC & Streams
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null; // FIX 4: Remote Stream cleanup
                }
                if (remoteAudio) {
                    remoteAudio.srcObject = null;
                }
                if (pc) {
                    pc.close();
                }

                callStatusText.textContent = reason === "rejected" ? "CALL DECLINED" : "CALL ENDED";
                callStatusText.style.color = "#ef4444";
                timerDisplay.style.display = 'none';
                avatarBox.style.borderColor = "#ef4444";
                
                actionArea.style.opacity = '0.3';
                connectedArea.style.opacity = '0.3';
                actionArea.style.pointerEvents = 'none';
                connectedArea.style.pointerEvents = 'none';

                try {
                    await updateDoc(callDocRef, {
                        status: reason === "rejected" ? "rejected" : "idle", // Send rejected if declined
                        caller: "none",
                        receiver: "none",
                        type: "none"
                    });
                } catch(err) { console.error(err); }

                // কল কাটার পর চ্যাট পেজে ফিরে যাওয়া
                setTimeout(() => {
                    window.location.href = "chat.html";
                }, 1500);
            };

            // ৩. Decline বাটনে ক্লিক (Reason = rejected)
            declineBtn.addEventListener('click', (e) => terminateCall("rejected", e));
            
            // ৪. End Call বাটনে ক্লিক (Reason = idle)
            endCallBtn.addEventListener('click', (e) => terminateCall("idle", e));

            // Window unload / refresh safety cleanup
            window.addEventListener('beforeunload', () => {
                stopRingtone();
                if (!isEnding) {
                    updateDoc(callDocRef, { status: "ended" }).catch(e => console.error(e));
                }
            });

            // অপরজন (Caller) যদি কল কেটে দেয়, তবে লিসেনার তা ধরে ফেলবে
            onSnapshot(callDocRef, (snap) => {
                if(!snap.exists() || isEnding) return;
                const data = snap.data();
                if(data.status === "idle" || data.status === "none" || data.status === "ended" || data.status === "cancel") {
                    terminateCall("idle"); // Caller কল কাটলে রিসিভারেরও কল কেটে চ্যাটে ব্যাক করবে
                }
            });

            // ২. কল রিসিভ (Accept) করলে WebRTC সেটআপ শুরু হবে
            acceptBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                
                // Stop ringtone immediately when accepted
                stopRingtone();
                
                callStatusText.textContent = "CONNECTING...";
                callStatusText.style.color = "#ffffff";
                avatarBox.style.borderColor = "#ffffff";
                
                // রিসিভ/ডিক্লাইন বাটনগুলো হাইড করা
                actionArea.style.opacity = '0';
                actionArea.style.transform = 'translateY(20px)';
                actionArea.style.pointerEvents = 'none';
                
                setTimeout(() => {
                    actionArea.style.display = 'none';
                    connectedArea.style.display = 'flex';
                    setTimeout(() => {
                        connectedArea.style.opacity = '1';
                        connectedArea.style.transform = 'translateY(0)';
                    }, 50);
                }, 300);

                // ==========================================
                // FIX 2: WebRTC Answer Logic with Try/Catch
                // ==========================================
                try {
                    // মাইক্রোফোন এক্সেস নেওয়া
                    localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                    localStream.getTracks().forEach((track) => {
                        pc.addTrack(track, localStream);
                    });

                    pc.ontrack = (event) => {
                        if (!remoteStream) remoteStream = new MediaStream();
                        event.streams[0].getTracks().forEach((track) => {
                            remoteStream.addTrack(track);
                        });
                        remoteAudio.srcObject = remoteStream; // Caller এর কথা শোনা যাবে
                    };

                    // FIX: Watch connection state for Timer & Disconnects
                    pc.onconnectionstatechange = () => {
                        if (pc.connectionState === 'connected') {
                            // কানেকশন হওয়ার পর টাইমার শুরু করা
                            callStatusText.textContent = "CONNECTED";
                            timerDisplay.style.display = 'block';
                            let seconds = 0;
                            clearInterval(timerInterval);
                            timerInterval = setInterval(() => {
                                seconds++;
                                const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                                const secs = String(seconds % 60).padStart(2, '0');
                                timerDisplay.textContent = `${mins}:${secs}`;
                            }, 1000);
                        } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                            terminateCall("idle");
                        }
                    };

                    // রিসিভারের ICE Candidates ডেটাবেসে পাঠানো
                    const receiverCandidatesCollection = collection(callDocRef, "receiverCandidates");
                    pc.onicecandidate = (event) => {
                        if (event.candidate) {
                            addDoc(receiverCandidatesCollection, event.candidate.toJSON());
                        }
                    };

                    // Caller-এর Offer ডেটাবেস থেকে পড়া এবং Answer তৈরি করা
                    const callDoc = await getDoc(callDocRef);
                    const callData = callDoc.data();
                    
                    if (callData.offer) {
                        const offerDescription = new RTCSessionDescription(callData.offer);
                        await pc.setRemoteDescription(offerDescription);

                        const answerDescription = await pc.createAnswer();
                        await pc.setLocalDescription(answerDescription);

                        const answer = {
                            type: answerDescription.type,
                            sdp: answerDescription.sdp,
                        };
                        
                        // ডেটাবেসে Answer এবং status: "accepted" আপডেট করা
                        await updateDoc(callDocRef, { answer, status: "accepted" });
                    }

                    // Caller-এর ICE Candidates রিসিভ করা (With Duplicate Protection)
                    const callerCandidatesCollection = collection(callDocRef, "callerCandidates");
                    onSnapshot(callerCandidatesCollection, (snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const data = change.doc.data();
                                if(data.candidate && !processedCandidates.has(data.candidate)) {
                                    const candidate = new RTCIceCandidate(data);
                                    pc.addIceCandidate(candidate).catch(e => console.error(e));
                                    processedCandidates.add(data.candidate);
                                }
                            }
                        });
                    });

                } catch (error) {
                    console.error("WebRTC Error:", error);
                    alert("Failed to establish connection. Check permissions.");
                    terminateCall("idle");
                }
            });
        });
    </script>
</body>
</html>
