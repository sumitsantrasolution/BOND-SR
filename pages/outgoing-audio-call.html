<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outgoing Audio Call</title>
    
        <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7c3aed">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BOND SR">

    <link rel="apple-touch-icon" href="assets/splash/icon.png">

    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_16_Plus__iPhone_15_Pro_Max__iPhone_15_Plus__iPhone_14_Pro_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_16__iPhone_15_Pro__iPhone_15__iPhone_14_Pro_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_14_Plus__iPhone_13_Pro_Max__iPhone_12_Pro_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_13_mini__iPhone_12_mini__iPhone_11_Pro__iPhone_XS__iPhone_X_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_11_Pro_Max__iPhone_XS_Max_portrait.png">
    <link rel="apple-touch-startup-image" media="screen and (orientation: portrait)" href="assets/splash/iPhone_11__iPhone_XR_portrait.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- মর্ফিং কন্টেইনার --- */
        .morph-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 50px;
            background-color: #111111;
            border-radius: 25px;
            border: 1px solid #222222;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .morph-container.expanded {
            width: 90%;
            max-width: 380px;
            height: 80vh;
            max-height: 700px;
            border-radius: 40px;
            background-color: #050505;
            border: 1px solid #1a1a1a;
            cursor: default;
        }

        /* --- পিল ভিউ --- */
        .pill-view {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .morph-container.expanded .pill-view {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulseFast 1s infinite alternate;
        }

        @keyframes pulseFast {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0.5; }
        }

        .pill-text {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* --- ফুল স্ক্রিন ভিউ --- */
        .full-view {
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px;
            pointer-events: none;
            transition: opacity 0.4s ease 0.3s;
        }

        .morph-container.expanded .full-view {
            opacity: 1;
            pointer-events: auto;
        }

        .caller-info {
            text-align: center;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-box {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 2px solid #10b981;
            padding: 4px;
            background-color: #000;
            transition: border-color 0.3s ease;
            animation: pulseAvatar 2s infinite; /* Calling Animation */
        }

        @keyframes pulseAvatar {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .avatar-box.connected {
            animation: none;
            border-color: #ffffff;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .caller-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .call-status {
            color: #10b981;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .timer-display {
            font-size: 18px;
            color: #ffffff;
            font-family: monospace;
            letter-spacing: 2px;
            display: none;
            margin-top: 10px;
        }

        /* --- বাটন এরিয়া --- */
        .action-area {
            display: flex;
            justify-content: center; /* আউটগোয়িং এ শুধু একটাই বাটন */
            align-items: center;
            width: 100%;
            padding: 0 10px 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .btn-decline {
            background-color: #1f0808;
            color: #ef4444;
            border: 1px solid #3b0f0f;
        }

        .btn-decline:active {
            background-color: #ef4444;
            color: #ffffff;
        }

        .btn-label {
            color: #737373;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <audio id="remoteAudio" autoplay></audio>

    <div class="morph-container" id="morphContainer">
        
        <div class="pill-view" id="pillView">
            <div class="pulse-dot"></div>
            <span class="pill-text">Calling...</span>
        </div>

        <div class="full-view">
            <div class="caller-info">
                <div class="avatar-box" id="avatarBox">
                    <img id="partnerPhoto" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop" class="avatar-img" alt="Profile">
                </div>
                <h1 class="caller-name" id="partnerName">Connecting...</h1>
                <p class="call-status" id="callStatusText">Calling...</p>
                <div class="timer-display" id="timerDisplay">00:00</div>
            </div>

            <div class="action-area" id="actionArea">
                <div class="btn-wrapper">
                    <button class="action-btn btn-decline" id="cancelCallBtn">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                    <span class="btn-label" id="cancelLabel">Cancel</span>
                </div>
            </div>
            
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js"; 
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"; 
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDbH6axEkR127PTFt0IM1VRoLA4xJh-Uow", 
            authDomain: "bond-rs.firebaseapp.com", 
            projectId: "bond-rs", 
            storageBucket: "bond-rs.firebasestorage.app", 
            messagingSenderId: "224682992857", 
            appId: "1:224682992857:web:6e4946b905606217758ac8" 
        }; 
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // সেশন থেকে ডায়নামিক আইডেন্টিটি নেওয়া
        let CURRENT_USER = sessionStorage.getItem("CURRENT_USER");
        
        // যদি সেশনে আইডেন্টিটি না থাকে, তাহলে লগইন পেজে পাঠিয়ে দেবে
        if (!CURRENT_USER) {
            window.location.href = "index.html";
        }
        
        // পার্টনার সিলেক্ট করা
        let OTHER_USER = (CURRENT_USER === "SUMIT") ? "RUBINA" : "SUMIT";
        
        const callDocRef = doc(db, "calls", "currentCall");

        // WebRTC Config
        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        let pc = new RTCPeerConnection(servers);
        let localStream = null;
        let remoteStream = new MediaStream();
        const processedCandidates = new Set(); // Fix: Duplicate ICE candidate protection

        // ==========================================
        // Audio Assets Setup & Cleanup Logic
        // ==========================================
        const dialTone = new Audio('assets/outgoing-call.mp3');
        dialTone.loop = true;
        const callEndedTone = new Audio('assets/call-ended.mp3');
        const busyTone = new Audio('assets/busy-tone.mp3');

        function stopAllTones() {
            dialTone.pause();
            dialTone.currentTime = 0;
            callEndedTone.pause();
            callEndedTone.currentTime = 0;
            busyTone.pause();
            busyTone.currentTime = 0;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const morphContainer = document.getElementById('morphContainer');
            const avatarBox = document.getElementById('avatarBox');
            const cancelCallBtn = document.getElementById('cancelCallBtn');
            const callStatusText = document.getElementById('callStatusText');
            const timerDisplay = document.getElementById('timerDisplay');
            const cancelLabel = document.getElementById('cancelLabel');
            const actionArea = document.getElementById('actionArea');
            const remoteAudio = document.getElementById('remoteAudio');

            let timerInterval;
            let isCallAccepted = false;
            let isEnding = false; // মাল্টিপল ক্লিক ঠেকানোর জন্য

            // Start Dial Tone immediately
            dialTone.play().catch(e => console.log("Audio autoplay blocked by browser", e));

            setTimeout(() => {
                morphContainer.classList.add('expanded');
            }, 200);

            // ==========================================
            // FIX: Cancel/End Button & Safe Tone End Logic
            // ==========================================
            async function endCallProcess(reason = "cancel") {
                if(isEnding) return;
                isEnding = true;
                
                clearInterval(timerInterval);
                
                // Fix: Full stream cleanup
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null;
                }
                if (remoteAudio) {
                    remoteAudio.srcObject = null;
                }
                if (pc) {
                    pc.close();
                }

                // Stop all ongoing tones
                stopAllTones();

                let activeTone = callEndedTone;
                
                // Play appropriate feedback tone
                if (reason === "busy") {
                    activeTone = busyTone;
                    callStatusText.textContent = "USER IS BUSY";
                } else {
                    if (isCallAccepted) callStatusText.textContent = "CALL ENDED";
                    else if (reason === "rejected") callStatusText.textContent = "CALL DECLINED";
                    else callStatusText.textContent = "CANCELLED";
                }

                callStatusText.style.color = "#ef4444";
                timerDisplay.style.display = 'none';
                avatarBox.style.borderColor = "#ef4444";
                avatarBox.classList.remove('connected');
                
                actionArea.style.opacity = '0.3';
                actionArea.style.pointerEvents = 'none';

                try {
                    await updateDoc(callDocRef, {
                        status: "idle",
                        caller: "none",
                        receiver: "none",
                        type: "none"
                    });
                } catch(err) {
                    console.error("Error ending call", err);
                }

                // Fix: Play tone then go back
                let isNavigated = false;
                const goBack = () => {
                    if(!isNavigated) {
                        isNavigated = true;
                        window.history.back();
                    }
                };

                activeTone.play().then(() => {
                    activeTone.onended = goBack;
                    // Fallback in case onended doesn't fire
                    setTimeout(goBack, 5000);
                }).catch(e => {
                    console.log("Audio blocked", e);
                    setTimeout(goBack, 1500);
                });
            }

            cancelCallBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                endCallProcess("cancel");
            });

            // ==========================================
            // WebRTC Setup (Async)
            // ==========================================
            async function setupWebRTC() {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                    localStream.getTracks().forEach((track) => {
                        pc.addTrack(track, localStream);
                    });
                } catch (error) {
                    console.error("Microphone access failed:", error);
                }

                pc.ontrack = (event) => {
                    event.streams[0].getTracks().forEach((track) => {
                        remoteStream.addTrack(track);
                    });
                    remoteAudio.srcObject = remoteStream; 
                };

                const callerCandidatesCollection = collection(callDocRef, "callerCandidates");
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        addDoc(callerCandidatesCollection, event.candidate.toJSON());
                    }
                };

                const offerDescription = await pc.createOffer();
                await pc.setLocalDescription(offerDescription);
                
                const offer = {
                    sdp: offerDescription.sdp,
                    type: offerDescription.type,
                };
                await setDoc(callDocRef, { offer }, { merge: true });
            }

            // ক্যামেরা এক্সেসের জন্য ওয়েট না করিয়ে ব্যাকগ্রাউন্ডে শুরু করে দেওয়া
            setupWebRTC();

            // ==========================================
            // Firebase Listener for Remote Events
            // ==========================================
            onSnapshot(callDocRef, (snap) => {
                if (!snap.exists() || isEnding) return;
                const call = snap.data();

                // Answer পাওয়া গেলে
                if (!pc.currentRemoteDescription && call.answer) {
                    const answerDescription = new RTCSessionDescription(call.answer);
                    pc.setRemoteDescription(answerDescription);
                }

                if (call.status === "accepted" && !isCallAccepted) {
                    isCallAccepted = true;
                    callStatusText.textContent = "CONNECTED";
                    callStatusText.style.color = "#ffffff";
                    avatarBox.classList.add('connected');
                    cancelLabel.textContent = "End Call";
                    
                    // Premium Feature: Stop Dial Tone with ~150ms delay
                    setTimeout(() => {
                        stopAllTones();
                    }, 150);
                    
                    timerDisplay.style.display = 'block';
                    let seconds = 0;
                    timerInterval = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        timerDisplay.textContent = `${mins}:${secs}`;
                    }, 1000);
                } 
                else if (call.status === "rejected") {
                    endCallProcess("rejected");
                }
                else if (call.status === "busy") {
                    // Receiver was in another call or simultaneous call occurred
                    endCallProcess("busy");
                }
                else if (call.status === "idle" && isCallAccepted) {
                    // অপরজন কল কেটে দিলে
                    endCallProcess("ended");
                }
            });

            const receiverCandidatesCollection = collection(callDocRef, "receiverCandidates");
            onSnapshot(receiverCandidatesCollection, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        // Fix: Duplicate Candidate Protection
                        if(data.candidate && !processedCandidates.has(data.candidate)) {
                            const candidate = new RTCIceCandidate(data);
                            pc.addIceCandidate(candidate).catch(e => console.log(e));
                            processedCandidates.add(data.candidate);
                        }
                    }
                });
            });

            // Load Partner Data
            getDoc(doc(db, "users", OTHER_USER)).then((userSnap) => {
                if(userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('partnerName').textContent = data.name || OTHER_USER;
                    if(data.photo) document.getElementById('partnerPhoto').src = data.photo;
                }
            }).catch(e => console.error(e));

        });
    </script>
</body>
</html>
