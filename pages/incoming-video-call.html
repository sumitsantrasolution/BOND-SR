<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Live Video Call Framework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           ১. INCOMING SCREEN STYLES (The Fluid Box)
           ========================================= */
        #incomingWrapper {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.5s ease;
        }

        .morph-container {
            width: 180px;
            height: 50px;
            background-color: #111111;
            border-radius: 25px;
            border: 1px solid #222222;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .morph-container.expanded {
            width: 90%;
            max-width: 380px;
            height: 80vh;
            max-height: 700px;
            border-radius: 40px;
            background-color: #050505;
            border: 1px solid #1a1a1a;
            cursor: default;
        }

        .pill-view {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .morph-container.expanded .pill-view {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulseFast 1s infinite alternate;
        }

        @keyframes pulseFast {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0.5; }
        }

        .pill-text {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .full-view {
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px;
            pointer-events: none;
            transition: opacity 0.4s ease 0.3s;
        }

        .morph-container.expanded .full-view {
            opacity: 1;
            pointer-events: auto;
        }

        .caller-info {
            text-align: center;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-box {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 2px solid #10b981;
            padding: 4px;
            background-color: #000;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .caller-name {
            color: #ffffff;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .call-status {
            color: #10b981;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .action-area {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            padding: 0 10px 20px;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .action-btn:active { transform: scale(0.9); }

        .btn-decline {
            background-color: #1f0808;
            color: #ef4444;
            border: 1px solid #3b0f0f;
        }

        .btn-accept {
            background-color: #062b1a;
            color: #10b981;
            border: 1px solid #0d4a2f;
        }

        .btn-label {
            color: #737373;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* =========================================
           ২. ACTIVE VIDEO SCREEN STYLES (Real Camera)
           ========================================= */
        #activeVideoContainer {
            position: absolute;
            inset: 0;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background-color: #000000;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            border-left: 1px solid #111;
            border-right: 1px solid #111;
        }

        /* রিমোট ভিডিও (সামনের জনের ভিডিও - ব্যাকএন্ড ইন্টিগ্রেশনের জন্য প্রস্তুত) */
        .remote-video-container {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #050505;
        }

        /* লোকাল ভিডিও (আপনার নিজের লাইভ ক্যামেরা ভিউ) */
        .local-video-pip {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 110px;
            height: 160px;
            background-color: #111111;
            border-radius: 16px;
            overflow: hidden;
            z-index: 10;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* সেলফি ক্যামেরার মতো মিরর ইফেক্ট */
            transform: scaleX(-1); 
        }

        .top-overlay {
            position: absolute;
            top: 40px;
            left: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .active-caller-name {
            color: #ffffff;
            font-size: 22px;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .call-timer {
            color: #10b981;
            font-size: 15px;
            font-weight: 600;
            font-family: monospace;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .control-dock-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            display: flex;
            justify-content: center;
        }

        .control-dock {
            background: rgba(15, 15, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .dock-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .dock-btn:active { transform: scale(0.88); }

        .dock-btn.disabled-state {
            background-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .dock-btn.btn-hangup {
            background-color: #ef4444;
            color: #ffffff;
            width: 60px;
            height: 60px;
            font-size: 22px;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
        }

        .video-off-overlay {
            position: absolute;
            inset: 0;
            background-color: #111;
            display: none;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 24px;
            z-index: 11;
        }

    </style>
</head>
<body>

    <div id="incomingWrapper">
        <div class="morph-container" id="morphContainer">
            
            <div class="pill-view" id="pillView">
                <div class="pulse-dot"></div>
                <span class="pill-text">Incoming Call...</span>
            </div>

            <div class="full-view">
                <div class="caller-info">
                    <div class="avatar-box">
                        <img id="partnerPhoto" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop" class="avatar-img" alt="Profile">
                    </div>
                    <h1 class="caller-name" id="partnerName">Sumit</h1>
                    <p class="call-status" id="callStatusText">Incoming Video Call</p>
                </div>

                <div class="action-area">
                    <div class="btn-wrapper">
                        <button class="action-btn btn-decline" id="declineBtn">
                            <i class="fas fa-times"></i>
                        </button>
                        <span class="btn-label">Decline</span>
                    </div>

                    <div class="btn-wrapper">
                        <button class="action-btn btn-accept" id="acceptBtn">
                            <i class="fas fa-video"></i>
                        </button>
                        <span class="btn-label">Accept</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="activeVideoContainer">
        
        <div class="remote-video-container">
            <video id="remoteVideo" autoplay playsinline poster="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=600&auto=format&fit=crop"></video>
        </div>

        <div class="local-video-pip">
            <div class="video-off-overlay" id="videoOffOverlay">
                <i class="fas fa-video-slash"></i>
            </div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>

        <div class="top-overlay">
            <h2 class="active-caller-name" id="activePartnerName">Sumit</h2>
            <div class="call-timer">
                <span class="live-dot"></span>
                <span id="activeTimer">00:00</span>
            </div>
        </div>

        <div class="control-dock-container">
            <div class="control-dock">
                <button class="dock-btn" id="micBtn"><i class="fas fa-microphone" id="micIcon"></i></button>
                <button class="dock-btn" id="camBtn"><i class="fas fa-video" id="camIcon"></i></button>
                <button class="dock-btn" id="flipBtn"><i class="fas fa-camera-rotate"></i></button>
                <button class="dock-btn btn-hangup" id="hangupCallBtn"><i class="fas fa-phone-slash"></i></button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js"; 
        import { getFirestore, doc, onSnapshot, updateDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js"; 
        
        const firebaseConfig = { 
            apiKey: "AIzaSyDbH6axEkR127PTFt0IM1VRoLA4xJh-Uow", 
            authDomain: "bond-rs.firebaseapp.com", 
            projectId: "bond-rs", 
            storageBucket: "bond-rs.firebasestorage.app", 
            messagingSenderId: "224682992857", 
            appId: "1:224682992857:web:6e4946b905606217758ac8" 
        }; 
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        const CALLER_USER = "SUMIT"; // যে কল করছে
        const callDocRef = doc(db, "calls", "currentCall");

        // WebRTC Config
        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        let pc = new RTCPeerConnection(servers);
        let localStream = null;
        let remoteStream = new MediaStream();

        document.addEventListener('DOMContentLoaded', () => {
            // ইনকামিং এলিমেন্ট
            const incomingWrapper = document.getElementById('incomingWrapper');
            const morphContainer = document.getElementById('morphContainer');
            const pillView = document.getElementById('pillView');
            const acceptBtn = document.getElementById('acceptBtn');
            const declineBtn = document.getElementById('declineBtn');
            const callStatusText = document.getElementById('callStatusText');

            // অ্যাক্টিভ ভিডিও এলিমেন্ট
            const activeVideoContainer = document.getElementById('activeVideoContainer');
            const activeTimer = document.getElementById('activeTimer');
            const hangupCallBtn = document.getElementById('hangupCallBtn');
            const localVideo = document.getElementById('localVideo');
            const remoteVideo = document.getElementById('remoteVideo');
            
            // ডক কন্ট্রোলস
            const micBtn = document.getElementById('micBtn');
            const camBtn = document.getElementById('camBtn');
            const flipBtn = document.getElementById('flipBtn');
            const micIcon = document.getElementById('micIcon');
            const camIcon = document.getElementById('camIcon');
            const videoOffOverlay = document.getElementById('videoOffOverlay');

            let callTimerInterval;
            let seconds = 0;
            let isEnding = false;

            // পার্টনারের প্রোফাইল লোড (যিনি কল করছেন)
            getDoc(doc(db, "users", CALLER_USER)).then((userSnap) => {
                if(userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('partnerName').textContent = data.name || CALLER_USER;
                    document.getElementById('activePartnerName').textContent = data.name || CALLER_USER;
                    if(data.photo) document.getElementById('partnerPhoto').src = data.photo;
                }
            });

            // ১. পিল এ ক্লিক ইভেন্ট
            pillView.addEventListener('click', (e) => {
                e.stopPropagation();
                morphContainer.classList.add('expanded');
            });

            // কল কেটে দেওয়ার কমন ফাংশন (Decline, Hangup এবং অপরজন কাটলে)
            const terminateCall = async (e) => {
                if(e) e.stopPropagation();
                if(isEnding) return;
                isEnding = true;

                clearInterval(callTimerInterval);
                
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                if (pc) {
                    pc.close();
                }

                callStatusText.textContent = "CALL ENDED";
                callStatusText.style.color = "#ef4444";
                activeTimer.textContent = "ENDED";
                activeTimer.style.color = "#ef4444";

                try {
                    await updateDoc(callDocRef, {
                        status: "idle",
                        caller: "none",
                        receiver: "none",
                        type: "none"
                    });
                } catch(err) { console.error(err); }

                // চ্যাটে রিডাইরেক্ট
                setTimeout(() => {
                    window.location.href = "chat.html";
                }, 1500);
            };

            // ২. ডিক্লাইন বাটন ক্লিক ইভেন্ট
            declineBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                callStatusText.textContent = "DECLINED";
                callStatusText.style.color = "#ef4444";
                try {
                    await updateDoc(callDocRef, { status: "rejected" });
                } catch(err) { console.error(err); }
                
                setTimeout(() => terminateCall(), 500);
            });

            // অপরজন (Caller) কল কেটে দিলে লিসেনার
            onSnapshot(callDocRef, (snap) => {
                if(!snap.exists() || isEnding) return;
                const data = snap.data();
                if(data.status === "idle" || data.status === "none") {
                    terminateCall();
                }
            });

            // ৫. Accept বাটন ক্লিক (WebRTC Answer Setup)
            acceptBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                callStatusText.textContent = "CONNECTING...";
                
                // প্রথমে ক্যামেরা পারমিশন প্রম্পট আসবে এবং ফ্রন্ট ক্যামেরা চালু হবে
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user" },
                        audio: true
                    });
                    localVideo.srcObject = localStream;

                    // লোকাল স্ট্রিম PeerConnection এ যুক্ত করা
                    localStream.getTracks().forEach((track) => {
                        pc.addTrack(track, localStream);
                    });
                } catch (error) {
                    console.error("Camera access denied or failed:", error);
                    alert("ক্যামেরা এক্সেস পাওয়া যায়নি! অনুগ্রহ করে পারমিশন দিন।");
                }
                
                // ক্যামেরা অন হওয়ার পর ইউআই ট্রানজিশন হবে
                incomingWrapper.style.opacity = '0';
                setTimeout(() => {
                    incomingWrapper.style.display = 'none';
                    activeVideoContainer.style.display = 'block';
                    
                    setTimeout(() => {
                        activeVideoContainer.style.opacity = '1';
                        
                        // টাইমার শুরু
                        seconds = 0;
                        callTimerInterval = setInterval(() => {
                            seconds++;
                            const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                            const secs = String(seconds % 60).padStart(2, '0');
                            activeTimer.textContent = `${mins}:${secs}`;
                        }, 1000);

                    }, 50);
                }, 400);

                // ==========================================
                // WebRTC Answer Logic Setup
                // ==========================================

                // Remote Stream (Caller's Video) আসলে তা রিসিভ করা
                pc.ontrack = (event) => {
                    event.streams[0].getTracks().forEach((track) => {
                        remoteStream.addTrack(track);
                    });
                    remoteVideo.srcObject = remoteStream;
                };

                // রিসিভারের ICE Candidates ডেটাবেসে পাঠানো
                const receiverCandidatesCollection = collection(callDocRef, "receiverCandidates");
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        addDoc(receiverCandidatesCollection, event.candidate.toJSON());
                    }
                };

                // Caller-এর Offer ডেটাবেস থেকে পড়া
                const callDoc = await getDoc(callDocRef);
                const callData = callDoc.data();
                
                if (callData.offer) {
                    const offerDescription = new RTCSessionDescription(callData.offer);
                    await pc.setRemoteDescription(offerDescription);

                    // Answer তৈরি করে ডেটাবেসে পাঠানো
                    const answerDescription = await pc.createAnswer();
                    await pc.setLocalDescription(answerDescription);

                    const answer = {
                        type: answerDescription.type,
                        sdp: answerDescription.sdp,
                    };
                    
                    await updateDoc(callDocRef, { answer, status: "accepted" });
                }

                // Caller-এর ICE Candidates রিসিভ করা
                const callerCandidatesCollection = collection(callDocRef, "callerCandidates");
                onSnapshot(callerCandidatesCollection, (snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === "added") {
                            const candidate = new RTCIceCandidate(change.doc.data());
                            pc.addIceCandidate(candidate);
                        }
                    });
                });
            });

            // ৬. কল এন্ড বাটন ক্লিক (ক্যামেরা বন্ধ হবে এবং চ্যাটে যাবে)
            hangupCallBtn.addEventListener('click', terminateCall);

            // ৭. অডিও মিউট টগল
            let isMuted = false;
            micBtn.addEventListener('click', () => {
                isMuted = !isMuted;
                if (isMuted) {
                    micBtn.classList.add('disabled-state');
                    micIcon.className = 'fas fa-microphone-slash';
                    if(localStream) localStream.getAudioTracks()[0].enabled = false;
                } else {
                    micBtn.classList.remove('disabled-state');
                    micIcon.className = 'fas fa-microphone';
                    if(localStream) localStream.getAudioTracks()[0].enabled = true;
                }
            });

            // ৮. ভিডিও অন/অফ টগল
            let isCamOff = false;
            camBtn.addEventListener('click', () => {
                isCamOff = !isCamOff;
                if (isCamOff) {
                    camBtn.classList.add('disabled-state');
                    camIcon.className = 'fas fa-video-slash';
                    videoOffOverlay.style.display = 'flex';
                    if(localStream) localStream.getVideoTracks()[0].enabled = false;
                } else {
                    camBtn.classList.remove('disabled-state');
                    camIcon.className = 'fas fa-video';
                    videoOffOverlay.style.display = 'none';
                    if(localStream) localStream.getVideoTracks()[0].enabled = true;
                }
            });

            // ৯. ক্যামেরা ফ্লিপ ইন্ডিকেটর
            flipBtn.addEventListener('click', () => {
                flipBtn.style.transform = 'rotate(180deg)';
                setTimeout(() => {
                    flipBtn.style.transform = 'rotate(0deg)';
                }, 300);
            });
        });
    </script>
</body>
</html>
